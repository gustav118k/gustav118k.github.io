<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wann Mensa heute?</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/mensa.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/">Gustav Hammer</a>
        <nav>
            <a href="/">Start</a>
            <a href="/wann-mensa-heute" aria-current="page">Wann Mensa heute?</a>
            <!-- Später: <a href="/fotoblog">Fotoblog</a> -->
        </nav>
    </header>

    <main>
        <!-- 1. Uhrzeit -->
        <h1>12:30 Uhr</h1>

        <!-- 2. + 3. Andere Uhrzeit -->
        <section id="different_time">
            <h3>Du willst zu einer anderen Uhrzeit gehen?</h3>
            <div id="time_suggestion">
                <label for="uhrzeit" class="visually-hidden">Uhrzeit</label>
                <input type="text" id="uhrzeit" name="uhrzeit" placeholder="hh:mm">
                <button onclick="vorschlagGeben()">Andere Uhrzeit vorschlagen</button>
            </div>
            <!-- 4. KI-Antwort (Platz für max. 280 Zeichen reserviert) -->
            <p id="vorschlag" class="answer-box"></p>
        </section>

        <!-- 5. + 6. Was gibt es heute -->
        <section id="meal_prediction">
            <h3>Du willst wissen, was es heute gibt?</h3>
            <button onclick="generateGericht()">Was gibt es heute?</button>
            <!-- 7. Generiertes Gericht -->
            <div id="gericht" class="answer-box"></div>
            <div id="loading" style="display:none;">Requesting Data via Mensa-API</div>
        </section>

        <!-- 8. Badges -->
        <section id="images">
            <h3>Badges</h3>
            <div class="badges">
                <img src="/anti_glibber_gang.png" alt="Anti Glibber Gang">
                <img src="/mensa_gold_mitglied.png" alt="Mensa Gold Mitglied">
                <img src="/kaiserschmarrn_liebhaber.png" alt="Kaiserschmarrn Liebhaber">
                <img src="/KKK.jpeg" alt="Kaiserschmarrn Kenner Klub">
                <img src="/spice.png" alt="Spice">
            </div>
        </section>

        <!-- 9. Acknowledgement -->
        <section id="thanks">
            <h3>Danke an</h3>
            <ul>
                <li><a href="https://github.com/l-4553">Lasse</a></li>
                <li>Leonie</li>
                <!-- Weitere Personen: einfach ein <li> ergänzen -->
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        © Gustav Hammer
    </footer>

    <script src="/mensa.js"></script>
</body>
</html>
